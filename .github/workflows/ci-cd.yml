name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ==========================================
  # BUILD & TEST
  # ==========================================
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # ===== Java Setup =====
      - name: Set up JDK 24
        uses: actions/setup-java@v4
        with:
          java-version: '24'
          distribution: 'corretto'
          cache: 'maven'

      # ===== Build Backend =====
      - name: Build Backend
        run: |
          cd backend
          mvn clean package -DskipTests    # ✅ Changed: mvnw → mvn

      # ===== Node Setup =====
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      # ===== Build Frontend =====
      - name: Build Frontend
        run: |
          cd frontend
          npm ci
          npm run build

  # ==========================================
  # DOCKER BUILD
  # ==========================================
  docker:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # ===== Docker Login =====
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # ===== Build & Push Backend =====
      - name: Build Backend Image
        run: |
          cd backend
          docker build -t ${{ secrets.DOCKER_USERNAME }}/cultivationx-backend:${{ github.sha }} .
          docker tag ${{ secrets.DOCKER_USERNAME }}/cultivationx-backend:${{ github.sha }} ${{ secrets.DOCKER_USERNAME }}/cultivationx-backend:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/cultivationx-backend:${{ github.sha }}
          docker push ${{ secrets.DOCKER_USERNAME }}/cultivationx-backend:latest

      # ===== Build & Push Frontend =====
      - name: Build Frontend Image
        run: |
          cd frontend
          docker build -t ${{ secrets.DOCKER_USERNAME }}/cultivationx-frontend:${{ github.sha }} .
          docker tag ${{ secrets.DOCKER_USERNAME }}/cultivationx-frontend:${{ github.sha }} ${{ secrets.DOCKER_USERNAME }}/cultivationx-frontend:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/cultivationx-frontend:${{ github.sha }}
          docker push ${{ secrets.DOCKER_USERNAME }}/cultivationx-frontend:latest
