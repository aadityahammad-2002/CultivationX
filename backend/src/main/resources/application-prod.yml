server:
  port: ${PORT:8080}
  servlet:
    context-path: /api

spring:
  application:
    name: CultivationX

  # ===== H2 DATABASE =====
  datasource:
    url: jdbc:h2:mem:cultivationx
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: none        # ← Hibernate band
    show-sql: true

  h2:
    console:
      enabled: true
      path: /h2-console

  sql:
    init:
      mode: always          # ← SQL scripts chalao
      schema-locations: classpath:schema.sql   # ← direct resources ke andar

  # ===== FILE UPLOAD =====
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB

  # ===== SPRING AI =====
  ai:
    openai:
      api-key: ${GROQ_API_KEY}
      base-url: https://api.groq.com/openai
      chat:
        options:
          model: llama-3.3-70b-versatile
          temperature: 0.7
          max-tokens: 4096

# ===== JWT =====
jwt:
  secret: ${JWT_SECRET}
  expiration: 86400000
  refresh-expiration: 604800000

# ===== APP CONFIG =====
app:
  resume:
    upload-dir: ./uploads/resumes
    max-size-mb: 10
    allowed-types:
      - application/pdf
      - application/vnd.openxmlformats-officedocument.wordprocessingml.document
  github:
    api-base-url: https://api.github.com
    oauth-client-id: ${GITHUB_CLIENT_ID}
    oauth-client-secret: ${GITHUB_CLIENT_SECRET}
  leetcode:
    graphql-url: https://leetcode.com/graphql
    api-base-url: https://leetcode.com

# ===== CORS =====
cors:
  allowed-origins: ${CORS_ORIGINS}
