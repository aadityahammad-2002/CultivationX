server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: CultivationX

  datasource:
    url: jdbc:h2:mem:cultivationx;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true

  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB

  ai:
    openai:
      api-key: ${GROQ_API_KEY}
      base-url: https://api.groq.com/openai
      chat:
        options:
          model: llama-3.3-70b-versatile
          temperature: 0.7
          max-tokens: 4096

jwt:
  secret: ${JWT_SECRET}
  expiration: 86400000
  refresh-expiration: 604800000

app:
  resume:
    upload-dir: ./uploads/resumes
    max-size-mb: 10
    allowed-types:
      - application/pdf
      - application/vnd.openxmlformats-officedocument.wordprocessingml.document
  github:
    api-base-url: https://api.github.com
    oauth-client-id: ${GITHUB_CLIENT_ID}
    oauth-client-secret: ${GITHUB_CLIENT_SECRET}
  leetcode:
    graphql-url: https://leetcode.com/graphql
    api-base-url: https://leetcode.com

cors:
  allowed-origins: ${CORS_ORIGINS}
